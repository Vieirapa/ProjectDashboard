<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editar Projeto</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>ProjectDashboard</h2>
      <div class="side-group">Workspace</div>
      <a class="side-link" href="/">Kanban</a>
      <a class="side-link" href="/profile.html">Meu perfil</a>
      <div class="side-group">Administração</div>
      <a id="usersLink" class="side-link" href="/admin-users.html">Usuários & Convites</a>
      <a id="settingsLink" class="side-link" href="/settings.html">Configurações</a>
      <div class="side-foot" id="whoami"></div>
    </aside>

    <main class="content">
      <header>
        <h1>✏️ Editar Projeto</h1>
        <div class="header-actions">
          <button id="backBtn" class="secondary">Voltar</button>
          <button id="deleteBtn" class="danger">Apagar projeto</button>
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>
      </header>

      <section class="edit-wrap">
        <div class="edit-two-cols">
          <form id="editForm" class="edit-form">
            <label>Nome</label><input id="name" required />
            <label>Descrição</label><textarea id="description" rows="4"></textarea>
            <label>Status</label><select id="status"></select>
            <label>Prioridade</label><select id="priority"></select>
            <label>Responsável</label><input id="owner" list="ownersList" />
            <datalist id="ownersList"></datalist>
            <label>Prazo</label><input id="dueDate" type="date" />
            <label>Anexo do card (1 arquivo)</label><input id="documentFile" type="file" />
            <label>Documento atual</label><input id="documentName" readonly />
            <label>Histórico da revisão</label>
            <div id="documentVersions" class="small">Sem revisões ainda.</div>
            <div class="dialog-actions"><button id="saveBtn" type="button">Salvar alterações</button></div>
            <p id="feedback" class="small"></p>
          </form>

          <section class="review-panel">
            <h3>Notas de revisão</h3>
            <textarea id="reviewNoteInput" rows="6" placeholder="Descreva o ajuste solicitado na revisão..."></textarea>
            <div class="dialog-actions" style="justify-content:flex-start; margin-top:8px;">
              <button type="button" id="addReviewNoteBtn">Adiciona nota</button>
            </div>
            <div class="small" style="margin-top:10px;">Histórico</div>
            <div id="reviewNotesHistory" class="small">Sem notas registradas.</div>
          </section>
        </div>
      </section>
    </main>
  </div>
  <script src="/edit.js"></script>
</body>
</html>
