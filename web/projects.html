<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projetos</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar-root" data-active="projects"></aside>

    <main class="content">
      <header>
        <h1>🗂️ Projetos</h1>
        <div class="header-actions">
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>
      </header>

      <section class="edit-wrap projects-page-wrap">
        <div class="edit-two-cols projects-top-cols">
          <form id="projectForm" class="edit-form">
            <label>ID do Projeto</label>
            <input id="projectId" type="number" readonly placeholder="(auto)" />
            <label>Nome do Projeto</label>
            <input id="projectName" required />
            <label class="inline-check" style="margin-top:6px;">
              <input id="isTemplate" type="checkbox" />
              Projeto template
            </label>
            <label>Data de Início</label>
            <input id="startDate" type="date" />
            <label>Notas</label>
            <textarea id="notes" rows="6"></textarea>
            <label>Acessível por (além de admin):</label>
            <div id="allowedRolesBox" class="allowed-roles-box">
              <label class="inline-check"><input type="checkbox" class="allowed-role" value="member" checked /> member</label>
              <label class="inline-check"><input type="checkbox" class="allowed-role" value="desenhista" checked /> desenhista</label>
              <label class="inline-check"><input type="checkbox" class="allowed-role" value="revisor" checked /> revisor</label>
              <label class="inline-check"><input type="checkbox" class="allowed-role" value="cliente" checked /> cliente</label>
            </div>
            <div class="dialog-actions" style="justify-content:flex-start;">
              <button type="button" id="newBtn" class="secondary">Novo</button>
              <button type="button" id="saveBtn">Salvar</button>
              <button type="button" id="deleteBtn" class="danger">Apagar</button>
            </div>
            <p id="feedback" class="small"></p>
          </form>

          <section class="review-panel">
            <h3>Projetos cadastrados</h3>
            <div id="projectsList" class="small">Carregando...</div>
          </section>
        </div>

        <section class="panel projects-cards-panel" style="margin-top: 14px;">
          <h3>Lista de Cards</h3>
          <div id="projectCardsList" class="small">Selecione um projeto para listar os cards.</div>
        </section>
      </section>
    </main>
  </div>

  <script src="/sidebar.js"></script>
  <script src="/projects.js"></script>
</body>
</html>
