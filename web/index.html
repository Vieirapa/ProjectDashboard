<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DocumentDashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>DocumentDashboard</h2>
      <select id="sidebarProjectSelect" class="sidebar-project-select"></select>
      <div class="side-group">Área de trabalho</div>
      <a class="side-link" href="/projects.html">Projetos</a>
      <a class="side-link active" href="/">Kanban</a>
      <a class="side-link" href="/profile.html">Meu perfil</a>
      <div class="side-group">Administração</div>
      <a id="usersLink" class="side-link" href="/admin-users.html">Usuários & Convites</a>
      <a id="settingsLink" class="side-link" href="/settings.html">Configurações</a>
      <div class="side-foot" id="whoami"></div>
    </aside>

    <main class="content">
      <header>
        <h1>📋 Kanban</h1>
        <div class="header-actions">
          <button id="newBtn">+ Novo documento</button>
          <button id="refreshBtn">Atualizar</button>
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>
      </header>

      <section id="filters">
        <input id="searchInput" placeholder="Buscar por nome/descrição" />
        <select id="statusFilter"><option value="">Todos os status</option></select>
        <select id="priorityFilter"><option value="">Todas prioridades</option></select>
        <input id="ownerFilter" placeholder="Filtrar por responsável" />
        <select id="sortOrderFilter">
          <option value="priority_desc">Ordenação: Prioridade (maior → menor)</option>
          <option value="priority_asc">Ordenação: Prioridade (menor → maior)</option>
          <option value="openedAt_desc">Ordenação: Data de abertura (mais novo → mais antigo)</option>
          <option value="openedAt_asc">Ordenação: Data de abertura (mais antigo → mais novo)</option>
          <option value="ageDays_desc">Ordenação: Tempo de ticket (maior → menor)</option>
          <option value="ageDays_asc">Ordenação: Tempo de ticket (menor → maior)</option>
          <option value="name_asc">Ordenação: Alfabética (A → Z)</option>
          <option value="name_desc">Ordenação: Alfabética (Z → A)</option>
          <option value="dueDate_asc">Ordenação: Prazo (mais próximo → mais distante)</option>
          <option value="dueDate_desc">Ordenação: Prazo (mais distante → mais próximo)</option>
          <option value="updatedAt_desc">Ordenação: Última atualização (mais recente → mais antiga)</option>
          <option value="updatedAt_asc">Ordenação: Última atualização (mais antiga → mais recente)</option>
        </select>
      </section>

      <main id="board"></main>
    </main>
  </div>

  <dialog id="documentDialog">
    <form method="dialog" id="documentForm">
      <h3>Novo documento</h3>
      <label>Nome</label><input id="pName" required />
      <label>Descrição</label><textarea id="pDescription" rows="3"></textarea>
      <label>Status</label><select id="pStatus"></select>
      <label>Prioridade</label><select id="pPriority"></select>
      <label>Responsável</label><input id="pOwner" list="ownersList" />
      <datalist id="ownersList"></datalist>
      <label>Prazo</label><input id="pDueDate" type="date" />
      <div class="dialog-actions">
        <button type="button" class="secondary" id="cancelDialogBtn">Cancelar</button>
        <button type="submit">Salvar</button>
      </div>
    </form>
  </dialog>

  <script src="/sidebar-project-select.js"></script>
  <script src="/app.js"></script>
</body>
</html>
