<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProjectDashbord · Início</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar-root" data-active="home"></aside>

    <main class="content">
      <section class="board-title-row">
        <h1>🏠 Painel de Resumo</h1>
        <div class="header-actions">
          <button id="goKanbanBtn">Abrir Kanban</button>
          <button id="refreshHomeBtn">Atualizar</button>
        </div>
      </section>

      <section class="panel-grid home-kpi-grid">
        <article class="panel home-kpi-card">
          <h3>Projetos com acesso</h3>
          <div id="kpiProjects" class="home-kpi-value">0</div>
        </article>
        <article class="panel home-kpi-card">
          <h3>Cards sob sua responsabilidade</h3>
          <div id="kpiOwned" class="home-kpi-value">0</div>
        </article>
        <article class="panel home-kpi-card">
          <h3>Documentos concluídos</h3>
          <div id="kpiDone" class="home-kpi-value">0</div>
        </article>
        <article class="panel home-kpi-card">
          <h3>Tempo médio de resolução</h3>
          <div id="kpiAvgResolution" class="home-kpi-value">-</div>
        </article>
      </section>

      <section class="panel" style="margin-top:0;">
        <h3>Resumo por projeto</h3>
        <div id="projectsSummaryTable" class="small">Carregando...</div>
      </section>
    </main>
  </div>

  <script src="/sidebar.js"></script>
  <script src="/dashboard.js"></script>
</body>
</html>
