<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProjectDashboard · Acesso temporariamente inativo</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="content" style="max-width: 820px; margin: 48px auto;">
    <section class="panel">
      <h1>⛔ Acesso temporariamente inativado</h1>
      <p>
        Os privilégios de acesso do seu usuário estão <strong>INATIVADOS TEMPORARIAMENTE</strong>.
      </p>
      <p>
        Entre em contato com o administrador do sistema para reportar este comportamento
        e solicitar reativação do seu perfil.
      </p>
      <div style="margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap;">
        <button id="logoutBtn" type="button">Sair</button>
        <a href="/login.html" class="small" style="align-self: center;">Ir para login</a>
      </div>
      <div id="msg" class="small" style="margin-top: 12px;"></div>
    </section>
  </main>

  <script>
    const btn = document.getElementById('logoutBtn');
    const msg = document.getElementById('msg');
    btn?.addEventListener('click', async () => {
      msg.textContent = '';
      try {
        await fetch('/api/logout', { method: 'POST' });
      } catch (_) {}
      window.location.href = '/login.html';
    });
  </script>
</body>
</html>
