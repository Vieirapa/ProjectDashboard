<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administração de Usuários</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar-root" data-active="users"></aside>

    <main class="content">
      <header>
        <h1>👥 Usuários & Convites</h1>
        <div class="header-actions"><button id="logoutBtn" class="secondary">Logout</button></div>
      </header>

      <section class="panel-grid">
        <section class="panel">
          <h3>Criar usuário direto</h3>
          <form id="createUserForm" class="form-grid">
            <input id="newUsername" placeholder="username" required />
            <input id="newPassword" placeholder="senha" required />
            <select id="newRole"><option value="member">member</option><option value="admin">admin</option></select>
            <button type="submit">Criar usuário</button>
          </form>
        </section>

        <section class="panel">
          <h3>Gerar convite</h3>
          <form id="inviteForm" class="form-grid">
            <select id="inviteRole"><option value="member">member</option><option value="admin">admin</option></select>
            <input id="inviteEmail" type="email" placeholder="email do convidado (opcional)" />
            <label class="inline-check">
              <input id="sendInviteEmail" type="checkbox" />
              <span>Enviar por e-mail</span>
            </label>
            <label>Mensagem</label>
            <textarea id="inviteMessage" rows="6">Olá!

Você foi convidado(a) para acessar o DocumentDashboard.

Use este link para concluir seu cadastro:
{invite_link}

Este convite expira em: {expires_at}

Bem-vindo(a) ao sistema!</textarea>
            <button type="submit">Gerar link de convite</button>
          </form>
          <p id="inviteOut" class="small"></p>
        </section>
      </section>

      <section class="panel">
        <h3>Usuários cadastrados</h3>
        <div id="usersList"></div>
      </section>

      <section class="panel">
        <h3>Log de auditoria</h3>
        <div id="auditList"></div>
      </section>
    </main>
  </div>
  <script src="/sidebar.js"></script>
  <script src="/admin-users.js"></script>
</body>
</html>
