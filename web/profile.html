<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meu Perfil</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>ProjectDashboard</h2>
      <div class="side-group">Workspace</div>
      <a class="side-link" href="/">Kanban</a>
      <a class="side-link active" href="/profile.html">Meu perfil</a>
      <div class="side-group">Administração</div>
      <a id="usersLink" class="side-link" href="/admin-users.html">Usuários & Convites</a>
      <a id="settingsLink" class="side-link" href="/settings.html">Configurações</a>
      <div class="side-foot" id="whoami"></div>
    </aside>

    <main class="content">
      <header>
        <h1>👤 Meu perfil</h1>
        <div class="header-actions">
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>
      </header>

      <section class="panel">
        <h3>Dados pessoais</h3>
        <form id="profileForm" class="form-grid" style="max-width: 760px;">
          <label>E-mail</label>
          <input id="email" type="email" placeholder="seuemail@empresa.com" />

          <label>Telefone</label>
          <input id="phone" placeholder="(11) 99999-9999" />

          <label>Ramal</label>
          <input id="extension" placeholder="1234" />

          <label style="margin-top:6px; font-weight:600;">Troca de senha</label>
          <label>Senha atual</label>
          <input id="currentPassword" type="password" placeholder="********" />
          <label>Nova senha</label>
          <input id="newPassword" type="password" placeholder="********" />
          <label>Repita senha</label>
          <input id="confirmPassword" type="password" placeholder="********" />
          <div class="dialog-actions" style="justify-content:flex-start;">
            <button id="changePasswordBtn" type="button">Trocar senha</button>
          </div>

          <label>Área de trabalho</label>
          <input id="work_area" placeholder="Ex.: Engenharia, Projetos, Qualidade" />

          <label>Notas</label>
          <textarea id="notes" rows="6" placeholder="Observações úteis para o time..."></textarea>

          <div class="dialog-actions" style="justify-content:flex-start;">
            <button id="saveBtn" type="submit">Salvar perfil</button>
          </div>
          <p id="feedback" class="small"></p>
        </form>
      </section>
    </main>
  </div>

  <script src="/profile.js"></script>
</body>
</html>
