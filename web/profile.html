<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meu Perfil</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar-root" data-active="profile"></aside>

    <main class="content">
      <section class="page-hero">
        <div>
          <p class="eyebrow">Conta</p>
          <h1>👤 Meu perfil</h1>
          <p class="page-subtitle">Atualize seus dados pessoais, ajuste preferências visuais e administre sua senha em uma área mais organizada.</p>
        </div>
        <div class="header-actions hero-actions">
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>
      </section>

      <section class="edit-wrap settings-page-wrap">
        <section class="panel settings-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Perfil</p>
              <h3>Dados pessoais e preferências</h3>
            </div>
            <span class="small">Informações pessoais e comportamento visual do usuário.</span>
          </div>
          <form id="profileForm" class="form-grid settings-form-grid settings-form-grid-wide">
            <label>E-mail</label>
            <input id="email" type="email" placeholder="seuemail@empresa.com" />

            <label>Telefone</label>
            <input id="phone" placeholder="(11) 99999-9999" />

            <label>Ramal</label>
            <input id="extension" placeholder="1234" />

            <label>Área de trabalho</label>
            <input id="work_area" placeholder="Ex.: Engenharia, Documentos, Qualidade" />

            <label>Notas</label>
            <textarea id="notes" rows="6" placeholder="Observações úteis para o time..."></textarea>

            <div class="settings-subsection settings-data-box">
              <h4 class="mt-0">Comportamento</h4>
              <label class="inline-check settings-inline-check" style="margin-bottom:8px;">
                <input id="priorityColorEnabled" type="checkbox" />
                <span>Habilitar cores de fundo no card por prioridade</span>
              </label>

              <div id="priorityColorsBox" class="priority-colors-grid settings-check-grid">
                <label>Baixa (azul claro)</label>
                <input id="colorBaixa" type="color" value="#dbeafe" />

                <label>Média (amarelo claro)</label>
                <input id="colorMedia" type="color" value="#fef3c7" />

                <label>Alta (laranja claro)</label>
                <input id="colorAlta" type="color" value="#fed7aa" />

                <label>Urgente (vermelho claro)</label>
                <input id="colorUrgente" type="color" value="#fecaca" />
              </div>
            </div>

            <div class="dialog-actions" style="justify-content:flex-start;">
              <button id="saveBtn" type="submit">Salvar perfil</button>
            </div>

            <div class="settings-subsection settings-data-box">
              <h4 class="mt-0">Trocar senha</h4>
              <label>Senha atual</label>
              <input id="currentPassword" type="password" placeholder="********" />
              <label>Nova senha</label>
              <input id="newPassword" type="password" placeholder="********" />
              <label>Repita senha</label>
              <input id="confirmPassword" type="password" placeholder="********" />
              <div class="dialog-actions" style="justify-content:flex-start;">
                <button id="changePasswordBtn" type="button">Trocar senha</button>
              </div>
            </div>

            <p id="feedback" class="small"></p>
          </form>
        </section>
      </section>
    </main>
  </div>

  <script src="/sidebar.js"></script>
  <script src="/profile.js"></script>
</body>
</html>
