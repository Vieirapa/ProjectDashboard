<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastro por Convite</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="center-wrap">
    <section class="auth-card">
      <h2>🎟️ Cadastro por Convite</h2>
      <form id="signupForm">
        <label>Usuário</label><input id="username" required />
        <label>Senha</label><input id="password" type="password" required />
        <button type="submit">Criar conta</button>
      </form>
      <p id="msg" class="small"></p>
      <p><a href="/login.html">Ir para login</a></p>
    </section>
  </main>
  <script src="/signup.js"></script>
</body>
</html>
